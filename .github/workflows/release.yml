name: Release

# Builds the single-file SPA and publishes a GitHub Release with
# `release/index.html` attached as the download artifact.
#
# Triggered two ways:
#   1. A git tag matching `v*` is pushed  →  automatic release
#   2. Manual run from the Actions tab (workflow_dispatch) → accepts a
#      `tag` input and creates a release at that tag
#
# The DHA workstation can't reach npm, so the published artifact is the
# entire deliverable: download `index.html` from the release page, open
# it directly from disk, done.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Verify build artifact exists
        run: |
          test -f release/index.html || { echo "release/index.html missing after build"; exit 1; }
          ls -la release/

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: release/index.html

name: Deploy to GitHub Pages

# Builds the SPA and publishes it (plus probe.html) to GitHub Pages so we
# can test from a real https:// origin instead of file://. This is a
# diagnostic surface for the Phase 0 connection problem on the DHA
# workstation; the file:// release/index.html artifact is still
# committed and remains the offline-distribution target.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Stage Pages site
        run: |
          mkdir -p _site
          cp release/index.html _site/index.html
          cp probe.html _site/probe.html
          # Tiny landing page so the user doesn't have to remember the
          # exact paths.
          cat > _site/landing.html <<'HTML'
          <!doctype html>
          <html><head><meta charset="utf-8"><title>ASKSageDocumentWriter — test surfaces</title>
          <style>body{font:14px system-ui,sans-serif;max-width:680px;margin:2rem auto;padding:0 1rem}
          a{display:block;padding:.75rem 1rem;margin:.5rem 0;border:1px solid #ccc;border-radius:4px;text-decoration:none;color:#1a1a1a}
          a:hover{background:#f4f4f4}small{color:#666}</style></head><body>
          <h1>ASKSageDocumentWriter — test surfaces</h1>
          <p>Two pages, both served from this <code>https://</code> origin
          so the browser computes a normal cross-origin request to
          <code>api.asksage.health.mil</code>.</p>
          <a href="./probe.html"><strong>probe.html</strong><br><small>The minimal hand-written probe. Run this first. If it succeeds here but failed from <code>file://</code>, the issue was the file origin.</small></a>
          <a href="./index.html"><strong>index.html</strong><br><small>The actual SPA (release build). Should work if probe.html works.</small></a>
          </body></html>
          HTML

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

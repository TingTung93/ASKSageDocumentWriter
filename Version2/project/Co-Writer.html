<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>Ask Sage · Document Co-Writer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ─── Design system ─────────────────────────────────────────── */
    :root {
      /* Warm, desaturated neutrals (oklch, kept under 0.015 chroma on whites) */
      --bg: oklch(0.985 0.004 85);
      --paper: oklch(1 0 0);
      --surface: oklch(0.975 0.006 85);
      --surface-sunk: oklch(0.955 0.008 85);
      --line: oklch(0.90 0.008 85);
      --line-strong: oklch(0.82 0.010 85);

      --ink: oklch(0.22 0.018 260);
      --ink-2: oklch(0.42 0.015 260);
      --ink-3: oklch(0.60 0.012 260);
      --ink-4: oklch(0.78 0.008 260);

      /* Single restrained accent: DHA-ish deep blue, recomposed in oklch */
      --accent: oklch(0.45 0.12 255);
      --accent-hover: oklch(0.38 0.13 255);
      --accent-soft: oklch(0.94 0.025 255);
      --accent-ink: oklch(0.35 0.13 255);

      /* Secondary signal colors — same chroma family */
      --gold: oklch(0.68 0.12 80);
      --gold-soft: oklch(0.96 0.03 85);
      --sage: oklch(0.60 0.08 155);
      --sage-soft: oklch(0.95 0.025 155);
      --rose: oklch(0.58 0.13 25);
      --rose-soft: oklch(0.95 0.025 25);

      --radius-sm: 4px;
      --radius: 8px;
      --radius-lg: 14px;

      --shadow-sm: 0 1px 0 oklch(0.22 0.018 260 / 0.04);
      --shadow-md: 0 1px 2px oklch(0.22 0.018 260 / 0.05), 0 4px 14px oklch(0.22 0.018 260 / 0.06);
      --shadow-lg: 0 2px 4px oklch(0.22 0.018 260 / 0.06), 0 16px 40px oklch(0.22 0.018 260 / 0.10);

      --font-sans: 'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
      --font-mono: 'IBM Plex Mono', ui-monospace, Consolas, monospace;
      --font-serif: 'Instrument Serif', Georgia, serif;

      --rail: 232px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--font-sans); font-size: 13.5px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    body { overflow: hidden; }

    button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
    button:focus-visible, a:focus-visible, [tabindex]:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

    ::selection { background: var(--accent-soft); color: var(--accent-ink); }

    /* ─── App shell ─────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: var(--rail) 1fr;
      grid-template-rows: 100vh;
      height: 100vh;
      width: 100vw;
    }

    /* ─── Sidebar ──────────────────────────────────────────────── */
    .rail {
      background: var(--surface);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .rail-head {
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mark {
      width: 26px; height: 26px; border-radius: 7px;
      background: var(--ink); color: var(--bg);
      display: grid; place-items: center;
      font-family: var(--font-serif); font-size: 20px; font-style: italic; line-height: 1;
      padding-bottom: 2px;
    }
    .brand-wrap { display: flex; flex-direction: column; line-height: 1.15; }
    .brand { font-weight: 600; font-size: 13px; letter-spacing: -0.005em; }
    .brand-sub { font-size: 10.5px; color: var(--ink-3); font-family: var(--font-mono); }

    .rail-section {
      padding: 14px 12px 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-3);
      display: flex; align-items: center; justify-content: space-between;
    }
    .rail-section .plus {
      width: 18px; height: 18px; border-radius: 4px;
      display: grid; place-items: center;
      color: var(--ink-2); font-weight: 400; font-size: 14px;
      transition: background .12s;
    }
    .rail-section .plus:hover { background: var(--surface-sunk); }

    .rail-list { display: flex; flex-direction: column; padding: 0 8px; gap: 1px; }
    .rail-item {
      display: grid;
      grid-template-columns: 14px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--ink-2);
      cursor: pointer;
      text-align: left;
      width: 100%;
    }
    .rail-item:hover { background: var(--surface-sunk); color: var(--ink); }
    .rail-item.active { background: var(--paper); color: var(--ink); box-shadow: var(--shadow-sm), inset 0 0 0 1px var(--line); font-weight: 500; }
    .rail-item .dot {
      width: 7px; height: 7px; border-radius: 999px;
      background: var(--ink-4);
    }
    .rail-item.active .dot { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .rail-item.running .dot { background: var(--gold); animation: pulse 1.6s ease-in-out infinite; }
    .rail-item .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rail-item .stamp { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 oklch(0.68 0.12 80 / 0.5); }
      50% { box-shadow: 0 0 0 4px oklch(0.68 0.12 80 / 0); }
    }

    .rail-nav {
      padding: 4px 8px;
      display: flex; flex-direction: column; gap: 1px;
    }
    .rail-nav button {
      display: grid;
      grid-template-columns: 14px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border-radius: 6px;
      color: var(--ink-2);
      font-size: 13px;
      width: 100%;
      text-align: left;
    }
    .rail-nav button:hover { background: var(--surface-sunk); color: var(--ink); }
    .rail-nav .kbd { font-family: var(--font-mono); font-size: 10px; color: var(--ink-4); }

    .rail-foot {
      margin-top: auto;
      padding: 10px 12px 14px;
      border-top: 1px solid var(--line);
      display: flex; flex-direction: column; gap: 8px;
    }
    .conn {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .conn-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--sage); box-shadow: 0 0 0 3px var(--sage-soft); flex-shrink: 0; }
    .conn-body { display: flex; flex-direction: column; line-height: 1.2; min-width: 0; flex: 1; }
    .conn-host { font-family: var(--font-mono); font-size: 11px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conn-meta { font-size: 10px; color: var(--ink-3); }
    .conn-cog { color: var(--ink-3); font-size: 14px; padding: 2px 4px; }
    .conn-cog:hover { color: var(--ink); }

    .user-chip {
      display: flex; align-items: center; gap: 9px; padding: 4px 6px; border-radius: 6px;
    }
    .user-chip:hover { background: var(--surface-sunk); }
    .avatar {
      width: 26px; height: 26px; border-radius: 999px;
      background: var(--accent); color: var(--paper);
      display: grid; place-items: center;
      font-size: 11px; font-weight: 600;
      flex-shrink: 0;
    }
    .user-who { display: flex; flex-direction: column; line-height: 1.2; min-width: 0; }
    .user-name { font-size: 12px; color: var(--ink); }
    .user-role { font-size: 10px; color: var(--ink-3); font-family: var(--font-mono); }

    /* ─── Workspace grid ───────────────────────────────────────── */
    .workspace {
      display: grid;
      grid-template-rows: 52px 1fr;
      min-height: 0;
      min-width: 0;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }
    .crumbs { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--ink-3); font-family: var(--font-mono); min-width: 0; }
    .crumbs .sep { color: var(--ink-4); }
    .crumbs .current { color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .crumbs .template { color: var(--ink-2); }
    .crumbs .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 2px 8px;
      background: var(--accent-soft); color: var(--accent-ink);
      border-radius: 999px;
      font-size: 11px; font-weight: 500;
      font-family: var(--font-sans);
      letter-spacing: 0.01em;
    }
    .topbar-actions { display: flex; align-items: center; gap: 6px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 11px;
      font-size: 12.5px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid var(--line-strong);
      background: var(--paper);
      color: var(--ink);
      transition: background .12s, border-color .12s, transform .05s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--surface); }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .btn-primary:hover { background: var(--ink-2); border-color: var(--ink-2); }
    .btn-accent { background: var(--accent); color: var(--paper); border-color: var(--accent); }
    .btn-accent:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-ghost { border-color: transparent; background: transparent; color: var(--ink-2); }
    .btn-ghost:hover { background: var(--surface); color: var(--ink); }
    .btn .kbd { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); margin-left: 4px; padding: 1px 5px; border: 1px solid var(--line); border-radius: 3px; background: var(--surface); }

    /* ─── Three-pane workspace ─────────────────────────────────── */
    .panes {
      display: grid;
      grid-template-columns: 300px 1fr 1fr;
      min-height: 0;
      min-width: 0;
    }
    .pane { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
    .pane + .pane { border-left: 1px solid var(--line); }

    .pane-head {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 10px 14px;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }
    .pane-title { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
    .pane-title h2 { margin: 0; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-2); }
    .pane-title .count { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); }
    .pane-actions { display: flex; align-items: center; gap: 4px; }
    .icon-btn { width: 24px; height: 24px; border-radius: 5px; color: var(--ink-3); display: grid; place-items: center; font-size: 14px; }
    .icon-btn:hover { background: var(--surface-sunk); color: var(--ink); }

    .pane-body { flex: 1; overflow: auto; min-height: 0; }

    /* ─── Sources pane ─────────────────────────────────────────── */
    .sources-subnav {
      display: flex;
      padding: 0 10px;
      gap: 2px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
      font-size: 12px;
    }
    .sources-subnav button {
      padding: 8px 10px;
      color: var(--ink-3);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-weight: 500;
    }
    .sources-subnav button.active { color: var(--ink); border-bottom-color: var(--accent); }
    .sources-subnav button:hover { color: var(--ink); }

    .src-group {
      padding: 10px 12px 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-3);
    }

    .src {
      margin: 2px 8px;
      padding: 10px 12px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .12s, box-shadow .12s, background .12s;
      position: relative;
    }
    .src:hover { border-color: var(--line-strong); box-shadow: var(--shadow-sm); }
    .src.cited { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); background: oklch(0.99 0.01 255); }
    .src-head { display: flex; align-items: center; gap: 8px; }
    .src-kind {
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.08em;
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--surface-sunk);
      color: var(--ink-2);
      text-transform: uppercase;
    }
    .src-kind.pdf { background: oklch(0.95 0.03 25); color: var(--rose); }
    .src-kind.docx { background: var(--accent-soft); color: var(--accent-ink); }
    .src-kind.web { background: var(--sage-soft); color: var(--sage); }
    .src-kind.rag { background: oklch(0.96 0.03 80); color: oklch(0.48 0.12 80); }
    .src-title { font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1.35; margin: 6px 0 2px; }
    .src-meta { font-size: 11px; color: var(--ink-3); font-family: var(--font-mono); display: flex; gap: 8px; align-items: center; }
    .src-meta .dotsep { color: var(--ink-4); }
    .src-refs {
      position: absolute; top: 10px; right: 10px;
      display: flex; gap: 3px;
    }
    .cite-pill {
      display: inline-grid; place-items: center;
      min-width: 18px; height: 18px;
      padding: 0 5px;
      background: var(--accent); color: var(--paper);
      border-radius: 4px;
      font-size: 10px; font-weight: 600;
      font-family: var(--font-mono);
    }
    .cite-pill.ghost { background: var(--surface-sunk); color: var(--ink-3); }

    .src-attach {
      margin: 8px 12px;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      padding: 18px 12px;
      text-align: center;
      color: var(--ink-3);
      font-size: 12px;
      cursor: pointer;
      transition: border-color .12s, background .12s, color .12s;
    }
    .src-attach:hover { border-color: var(--accent); color: var(--accent-ink); background: var(--accent-soft); }
    .src-attach .big { font-size: 18px; color: var(--ink-3); }

    /* ─── Chat pane ────────────────────────────────────────────── */
    .chat-body {
      padding: 20px 22px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .msg { display: grid; grid-template-columns: 26px 1fr; gap: 10px; align-items: flex-start; max-width: 640px; }
    .msg .who {
      width: 26px; height: 26px; border-radius: 6px;
      display: grid; place-items: center;
      font-size: 11px; font-weight: 600;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .msg.user .who { background: var(--accent-soft); color: var(--accent-ink); }
    .msg.ai .who { background: var(--ink); color: var(--bg); font-family: var(--font-serif); font-size: 18px; font-style: italic; padding-bottom: 2px; }
    .msg.system .who { background: var(--gold-soft); color: var(--gold); }
    .msg-name { font-size: 11.5px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 8px; }
    .msg-name .time { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); font-weight: 400; }
    .msg-body { margin-top: 3px; color: var(--ink); font-size: 13.5px; line-height: 1.6; }
    .msg-body p { margin: 0 0 8px; }
    .msg-body p:last-child { margin-bottom: 0; }

    .msg.system { max-width: 100%; }
    .msg.system .msg-body {
      padding: 10px 14px;
      background: var(--gold-soft);
      border: 1px solid oklch(0.88 0.08 85);
      border-radius: 8px;
      font-size: 12.5px;
      color: oklch(0.38 0.09 60);
    }

    .msg-actions { display: flex; gap: 2px; margin-top: 6px; opacity: 0; transition: opacity .12s; }
    .msg:hover .msg-actions { opacity: 1; }
    .msg-action { font-size: 11px; color: var(--ink-3); padding: 3px 6px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; }
    .msg-action:hover { background: var(--surface); color: var(--ink); }

    .thinking {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--ink-3);
      font-family: var(--font-mono);
    }
    .thinking-pulse { display: flex; gap: 3px; }
    .thinking-pulse span {
      width: 4px; height: 4px; border-radius: 999px; background: var(--ink-3);
      animation: think 1.2s ease-in-out infinite;
    }
    .thinking-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-pulse span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes think { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-2px); } }

    .tool-card {
      margin-top: 8px;
      padding: 10px 12px;
      background: var(--surface-sunk);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 12px;
    }
    .tool-title { display: flex; align-items: center; gap: 6px; font-weight: 600; color: var(--ink); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.02em; }
    .tool-title .icon { width: 14px; height: 14px; border-radius: 3px; background: var(--paper); display: grid; place-items: center; font-size: 10px; color: var(--ink-2); border: 1px solid var(--line); }
    .tool-list { margin: 6px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 3px; }
    .tool-list li { display: flex; align-items: center; gap: 8px; color: var(--ink-2); font-size: 12px; }
    .tool-list .check { color: var(--sage); }
    .tool-list .n { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); margin-left: auto; }

    .apply-strip {
      display: inline-flex;
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .apply-strip button {
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-2);
    }
    .apply-strip button.primary { background: var(--ink); color: var(--bg); }
    .apply-strip button.primary:hover { background: var(--ink-2); }
    .apply-strip button:not(.primary):hover { background: var(--surface); color: var(--ink); }
    .apply-strip button + button { border-left: 1px solid var(--line); }

    /* Composer */
    .composer {
      padding: 10px 16px 14px;
      border-top: 1px solid var(--line);
      background: var(--bg);
    }
    .composer-inner {
      background: var(--paper);
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      padding: 10px 12px 8px;
      box-shadow: var(--shadow-sm);
      transition: border-color .12s, box-shadow .12s;
    }
    .composer-inner:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .composer textarea {
      width: 100%;
      border: 0;
      outline: none;
      resize: none;
      font: inherit;
      font-size: 13.5px;
      line-height: 1.5;
      color: var(--ink);
      background: transparent;
      min-height: 42px;
      max-height: 160px;
    }
    .composer textarea::placeholder { color: var(--ink-4); }
    .composer-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 4px;
      gap: 8px;
    }
    .composer-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px;
      font-size: 11px;
      color: var(--ink-2);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 999px;
      cursor: pointer;
      transition: border-color .12s, background .12s;
    }
    .chip:hover { border-color: var(--line-strong); }
    .chip.on { background: var(--accent-soft); color: var(--accent-ink); border-color: oklch(0.85 0.06 255); }
    .chip .x { color: var(--ink-3); }

    .send-row { display: flex; align-items: center; gap: 8px; }
    .model-pick {
      font-size: 11px; color: var(--ink-3); font-family: var(--font-mono);
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 999px;
      cursor: pointer;
    }
    .model-pick:hover { background: var(--surface); color: var(--ink); }

    .send-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--ink); color: var(--bg);
      display: grid; place-items: center;
      transition: background .12s, transform .06s;
    }
    .send-btn:hover { background: var(--ink-2); }
    .send-btn:active { transform: translateY(1px); }
    .send-btn.disabled { background: var(--ink-4); cursor: not-allowed; }

    /* ─── Draft pane ───────────────────────────────────────────── */
    .draft-head {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 10px 16px;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }
    .draft-title { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .draft-name { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .draft-status {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 2px 8px 2px 6px;
      font-size: 10.5px;
      font-family: var(--font-mono);
      color: var(--ink-2);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 999px;
      letter-spacing: 0.02em;
    }
    .draft-status .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--ink-4); }
    .draft-status.drafting .dot { background: var(--gold); animation: pulse 1.6s ease-in-out infinite; }
    .draft-status.done .dot { background: var(--sage); }
    .draft-status.review .dot { background: var(--accent); }

    .draft-toc {
      padding: 4px 14px 10px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .draft-toc::-webkit-scrollbar { display: none; }
    .toc-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      font-size: 11px;
      color: var(--ink-2);
      font-family: var(--font-mono);
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--paper);
      white-space: nowrap;
      cursor: pointer;
      transition: border-color .12s, background .12s;
    }
    .toc-chip:hover { border-color: var(--line-strong); }
    .toc-chip.done { color: var(--sage); border-color: oklch(0.88 0.05 155); background: var(--sage-soft); }
    .toc-chip.active { color: var(--accent-ink); border-color: var(--accent); background: var(--accent-soft); }
    .toc-chip.active .dot { background: var(--gold); animation: pulse 1.6s ease-in-out infinite; }
    .toc-chip .dot { width: 5px; height: 5px; border-radius: 999px; background: var(--ink-4); }
    .toc-chip.done .dot { background: var(--sage); }
    .toc-chip.queued { color: var(--ink-3); background: var(--surface); }

    .draft-doc {
      padding: 32px 56px 80px;
      max-width: 820px;
      margin: 0 auto;
      background: var(--paper);
      font-family: var(--font-sans);
    }
    .doc-header {
      text-align: center;
      padding-bottom: 22px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--line);
    }
    .doc-eyebrow {
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.18em;
      color: var(--ink-3);
      text-transform: uppercase;
    }
    .doc-title {
      font-family: var(--font-serif);
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.01em;
      margin: 8px 0 4px;
      color: var(--ink);
      line-height: 1.2;
    }
    .doc-sub {
      font-size: 12.5px;
      color: var(--ink-3);
      font-family: var(--font-mono);
    }

    .doc-section { margin: 28px 0; position: relative; scroll-margin-top: 20px; }
    .doc-section.streaming::after {
      content: "";
      display: inline-block;
      width: 7px; height: 16px;
      background: var(--accent);
      vertical-align: -3px;
      margin-left: 1px;
      animation: blink 1s steps(2) infinite;
    }
    @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }

    .doc-section .sec-num {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--ink-3);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .doc-section h3 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.005em;
      margin: 0 0 10px;
      color: var(--ink);
    }
    .doc-section p {
      font-size: 13.5px;
      line-height: 1.7;
      color: oklch(0.28 0.015 260);
      margin: 0 0 12px;
      text-wrap: pretty;
    }
    .doc-section ul, .doc-section ol {
      margin: 0 0 12px;
      padding-left: 22px;
      font-size: 13.5px;
      line-height: 1.7;
      color: oklch(0.28 0.015 260);
    }
    .doc-section li { margin-bottom: 3px; }

    .cite {
      display: inline-grid; place-items: center;
      min-width: 15px; height: 15px;
      padding: 0 3px;
      margin: 0 1px;
      background: var(--accent-soft);
      color: var(--accent-ink);
      font-family: var(--font-mono);
      font-size: 9.5px;
      font-weight: 600;
      border-radius: 3px;
      vertical-align: 1px;
      cursor: pointer;
      transition: background .12s, color .12s;
    }
    .cite:hover, .cite.active { background: var(--accent); color: var(--paper); }

    /* Floating section controls */
    .sec-toolbar {
      position: absolute;
      top: -10px; right: -8px;
      display: flex;
      gap: 2px;
      padding: 3px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      opacity: 0;
      transition: opacity .15s;
    }
    .doc-section:hover .sec-toolbar { opacity: 1; }
    .sec-toolbar button {
      padding: 4px 8px;
      font-size: 11px;
      color: var(--ink-2);
      border-radius: 5px;
    }
    .sec-toolbar button:hover { background: var(--surface); color: var(--ink); }

    .sec-finding {
      margin: 8px 0 12px;
      padding: 10px 12px;
      background: oklch(0.97 0.02 255);
      border: 1px solid oklch(0.85 0.05 255);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      font-size: 12px;
      color: var(--ink-2);
      display: grid;
      grid-template-columns: 18px 1fr auto;
      gap: 8px;
      align-items: flex-start;
    }
    .sec-finding .ico { color: var(--accent); font-weight: 600; margin-top: -1px; }
    .sec-finding .fix {
      background: var(--accent); color: var(--paper);
      padding: 3px 9px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }
    .sec-finding .fix:hover { background: var(--accent-hover); }

    /* Inline-edit popover for section regen */
    .sec-editing {
      margin: 10px 0 14px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 10px;
      box-shadow: var(--shadow-md);
    }
    .sec-editing-label { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; color: var(--accent-ink); text-transform: uppercase; font-family: var(--font-mono); }
    .sec-editing textarea {
      width: 100%; border: 0; outline: none; resize: none;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit; font-size: 13px;
      min-height: 46px;
      margin-top: 6px;
    }
    .sec-editing-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 8px; }

    /* ─── Review panel (slides in right side) ─────────────────── */
    .review-summary {
      margin: 18px auto 0;
      max-width: 820px;
      padding: 0 56px;
    }
    .review-card {
      padding: 16px 18px;
      background: linear-gradient(180deg, oklch(0.99 0.005 260), var(--paper));
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
    }
    .review-head {
      display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
    }
    .review-head h4 {
      margin: 0;
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 400;
      color: var(--ink);
    }
    .review-head .done-chip {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--sage);
      display: inline-flex; align-items: center; gap: 5px;
    }
    .review-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 14px; }
    .review-stat {
      padding: 10px 12px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .review-stat .k { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); font-family: var(--font-mono); }
    .review-stat .v { font-size: 20px; font-weight: 600; color: var(--ink); margin-top: 2px; font-variant-numeric: tabular-nums; }
    .review-stat .v.accent { color: var(--accent); }
    .review-stat .v.rose { color: var(--rose); }
    .review-findings {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .finding-row {
      display: grid; grid-template-columns: 16px 1fr auto; gap: 10px; align-items: flex-start;
      padding: 8px 10px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 12.5px;
      color: var(--ink-2);
    }
    .finding-row .sev { font-family: var(--font-mono); font-size: 10px; margin-top: 2px; }
    .finding-row .sev.info { color: var(--accent); }
    .finding-row .sev.warn { color: var(--gold); }
    .finding-row .sev.rose { color: var(--rose); }
    .finding-row .jump { color: var(--ink-3); font-size: 11px; }
    .finding-row .jump:hover { color: var(--ink); }

    /* ─── Rationale bar (top intro) ────────────────────────────── */
    .intro {
      padding: 14px 22px 10px;
      border-bottom: 1px dashed var(--line);
      background: var(--gold-soft);
      font-size: 12px;
      color: oklch(0.38 0.09 60);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }
    .intro .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-right: 8px; }
    .intro button.close { color: oklch(0.38 0.09 60); padding: 4px 8px; border-radius: 4px; }
    .intro button.close:hover { background: oklch(0.92 0.06 80); }

    /* ─── Empty state ──────────────────────────────────────────── */
    .empty-wrap {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 40px;
    }
    .empty {
      max-width: 520px;
      text-align: center;
    }
    .empty .mark-lg {
      width: 56px; height: 56px; border-radius: 14px;
      background: var(--ink); color: var(--bg);
      display: inline-grid; place-items: center;
      font-family: var(--font-serif); font-size: 40px; font-style: italic;
      margin-bottom: 20px; padding-bottom: 4px;
    }
    .empty h1 { font-family: var(--font-serif); font-size: 32px; font-weight: 400; margin: 0 0 10px; letter-spacing: -0.01em; }
    .empty p { font-size: 14px; color: var(--ink-2); line-height: 1.6; margin: 0 auto 22px; max-width: 420px; }
    .empty-starters { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; margin-top: 20px; }
    .starter {
      padding: 14px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color .12s, box-shadow .12s, transform .05s;
    }
    .starter:hover { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .starter .starter-kind { font-size: 10px; letter-spacing: 0.1em; color: var(--ink-3); text-transform: uppercase; font-family: var(--font-mono); }
    .starter .starter-title { font-size: 13.5px; font-weight: 600; margin: 4px 0 2px; color: var(--ink); }
    .starter .starter-desc { font-size: 12px; color: var(--ink-3); line-height: 1.45; }

    /* ─── Tweaks panel ─────────────────────────────────────────── */
    .tweaks {
      position: fixed; right: 18px; bottom: 18px;
      width: 264px;
      background: var(--paper);
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      padding: 12px 14px 14px;
      z-index: 100;
      display: none;
      font-size: 12.5px;
    }
    .tweaks.open { display: block; }
    .tweaks h5 { margin: 0 0 8px; font-size: 11px; letter-spacing: 0.1em; font-weight: 600; color: var(--ink-3); text-transform: uppercase; font-family: var(--font-mono); display: flex; justify-content: space-between; align-items: center; }
    .tweaks h5 + .tw-group { margin-top: 4px; }
    .tw-group { margin-top: 14px; }
    .tw-label { font-size: 11px; color: var(--ink-3); margin-bottom: 6px; font-family: var(--font-mono); letter-spacing: 0.04em; }
    .tw-seg {
      display: grid; grid-auto-columns: 1fr; grid-auto-flow: column;
      border: 1px solid var(--line); border-radius: 6px; overflow: hidden;
    }
    .tw-seg button {
      padding: 6px 8px;
      font-size: 11.5px;
      color: var(--ink-2);
      background: var(--surface);
    }
    .tw-seg button + button { border-left: 1px solid var(--line); }
    .tw-seg button.on { background: var(--ink); color: var(--bg); }
    .tw-seg button:not(.on):hover { background: var(--surface-sunk); color: var(--ink); }
    .tw-close { color: var(--ink-3); font-size: 14px; padding: 0 4px; }

    .dot-accent { width: 18px; height: 18px; border-radius: 5px; border: 1px solid var(--line); cursor: pointer; }
    .dot-accent.on { outline: 2px solid var(--ink); outline-offset: 2px; }

    /* Density modes */
    body.dense { font-size: 12.5px; }
    body.dense .draft-doc { padding: 20px 44px 60px; }
    body.dense .chat-body { padding: 14px 18px 14px; gap: 14px; }
    body.dense .doc-section { margin: 20px 0; }
    body.dense .doc-title { font-size: 24px; }

    body.airy .draft-doc { padding: 48px 72px 100px; }
    body.airy .chat-body { padding: 28px 28px 24px; gap: 28px; }
    body.airy .doc-section { margin: 36px 0; }

    /* Dark variant hook */
    body.dark { --bg: oklch(0.18 0.012 260); --paper: oklch(0.22 0.014 260); --surface: oklch(0.25 0.014 260); --surface-sunk: oklch(0.28 0.014 260); --line: oklch(0.32 0.016 260); --line-strong: oklch(0.42 0.018 260); --ink: oklch(0.95 0.005 260); --ink-2: oklch(0.82 0.008 260); --ink-3: oklch(0.66 0.010 260); --ink-4: oklch(0.50 0.012 260); --accent-soft: oklch(0.32 0.06 255); }
  
    /* ─── Settings surface ───────────────────────────────────── */
    .settings-wrap { overflow-y: auto; padding: 32px 40px 80px; }
    .settings-inner { max-width: 860px; margin: 0 auto; }
    .settings-eyebrow { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.18em; color: var(--ink-3); text-transform: uppercase; }
    .settings-title { font-family: var(--font-serif); font-size: 30px; font-weight: 400; letter-spacing: -0.01em; margin: 6px 0 6px; }
    .settings-lead { color: var(--ink-2); font-size: 13.5px; margin: 0 0 24px; max-width: 620px; line-height: 1.55; }

    .settings-grid { display: grid; grid-template-columns: 220px 1fr; gap: 28px; align-items: start; }
    .settings-nav { position: sticky; top: 16px; display: flex; flex-direction: column; gap: 1px; }
    .settings-nav button {
      text-align: left; padding: 7px 10px; border-radius: 6px;
      color: var(--ink-3); font-size: 12.5px; font-weight: 500;
      display: grid; grid-template-columns: 14px 1fr; gap: 10px; align-items: center;
    }
    .settings-nav button:hover { background: var(--surface); color: var(--ink); }
    .settings-nav button.on { background: var(--paper); color: var(--ink); box-shadow: inset 0 0 0 1px var(--line), var(--shadow-sm); }
    .settings-nav button.on .bullet { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .settings-nav .bullet { width: 7px; height: 7px; border-radius: 999px; background: var(--ink-4); }

    .s-card {
      background: var(--paper); border: 1px solid var(--line); border-radius: 12px;
      padding: 20px 22px; box-shadow: var(--shadow-sm);
    }
    .s-card + .s-card { margin-top: 14px; }
    .s-head { display: grid; grid-template-columns: 1fr auto; align-items: baseline; gap: 12px; margin-bottom: 14px; }
    .s-head h3 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: -0.005em; color: var(--ink); }
    .s-head .s-desc { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
    .s-head .s-status {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; font-size: 11px; font-family: var(--font-mono);
      border-radius: 999px; background: var(--sage-soft); color: var(--sage);
      border: 1px solid oklch(0.88 0.05 155);
    }
    .s-head .s-status.warn { background: var(--gold-soft); color: var(--gold); border-color: oklch(0.88 0.08 85); }
    .s-head .s-status .d { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }

    .s-row { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .s-row.two { grid-template-columns: 1fr 1fr; }
    .s-field label { display: block; font-size: 11.5px; font-weight: 600; color: var(--ink-2); margin-bottom: 5px; letter-spacing: 0.01em; }
    .s-field .hint { font-size: 11px; color: var(--ink-3); margin-top: 5px; line-height: 1.4; }
    .s-field input, .s-field select, .s-field textarea {
      width: 100%; padding: 8px 11px;
      border: 1px solid var(--line-strong); border-radius: 6px;
      background: var(--paper); color: var(--ink);
      font: inherit; font-size: 13px;
      transition: border-color .12s, box-shadow .12s;
    }
    .s-field input.mono, .s-field textarea.mono { font-family: var(--font-mono); font-size: 12px; }
    .s-field input:focus, .s-field select:focus, .s-field textarea:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .s-field .input-row { display: grid; grid-template-columns: 1fr auto; gap: 6px; }
    .s-field .input-row button {
      padding: 8px 12px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--line-strong); border-radius: 6px; background: var(--paper); color: var(--ink);
    }
    .s-field .input-row button:hover { background: var(--surface); }

    .provider-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .provider-card {
      padding: 12px 14px; background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
      cursor: pointer; transition: border-color .12s, box-shadow .12s, background .12s;
    }
    .provider-card:hover { border-color: var(--line-strong); }
    .provider-card.on { background: var(--paper); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .provider-card .pc-head { display: flex; align-items: center; gap: 10px; }
    .provider-card .pc-mark {
      width: 28px; height: 28px; border-radius: 7px; display: grid; place-items: center;
      background: var(--ink); color: var(--bg); font-family: var(--font-serif); font-style: italic; font-size: 18px; padding-bottom: 2px;
    }
    .provider-card.on .pc-mark { background: var(--accent); color: var(--paper); }
    .provider-card .pc-name { font-size: 13px; font-weight: 600; }
    .provider-card .pc-url { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); }
    .provider-card .pc-feats {
      margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px;
    }
    .provider-card .pc-feats span {
      font-family: var(--font-mono); font-size: 10px;
      padding: 2px 6px; border-radius: 3px;
      background: var(--paper); color: var(--ink-3); border: 1px solid var(--line);
    }
    .provider-card.on .pc-feats span { background: var(--accent-soft); color: var(--accent-ink); border-color: oklch(0.88 0.05 255); }

    .model-row {
      display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center;
      padding: 9px 12px; border-radius: 8px;
      border: 1px solid var(--line); background: var(--surface);
    }
    .model-row + .model-row { margin-top: 6px; }
    .model-row .mr-name { font-family: var(--font-mono); font-size: 12px; color: var(--ink); }
    .model-row .mr-role {
      font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 999px;
      background: var(--paper); border: 1px solid var(--line); color: var(--ink-3); font-family: var(--font-mono);
    }
    .model-row .mr-role.primary { background: var(--accent-soft); color: var(--accent-ink); border-color: oklch(0.88 0.05 255); }
    .model-row .mr-role.embed   { background: var(--sage-soft); color: var(--sage); border-color: oklch(0.88 0.05 155); }
    .model-row .mr-role.critic  { background: var(--gold-soft); color: var(--gold); border-color: oklch(0.88 0.08 85); }
    .model-row .mr-cost { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
    .model-row .mr-swap {
      font-size: 11px; color: var(--ink-3); padding: 3px 8px; border-radius: 5px;
    }
    .model-row .mr-swap:hover { background: var(--paper); color: var(--ink); }

    .s-slider { display: grid; grid-template-columns: 1fr 60px; gap: 12px; align-items: center; }
    .s-slider input[type="range"] { width: 100%; accent-color: var(--accent); }
    .s-slider .val { font-family: var(--font-mono); font-size: 12px; color: var(--ink); text-align: right; }

    .s-toggle { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; padding: 10px 0; }
    .s-toggle + .s-toggle { border-top: 1px solid var(--line); }
    .s-toggle-text { flex: 1; }
    .s-toggle-text .s-toggle-label { font-size: 13px; font-weight: 500; color: var(--ink); }

    .switch {

const SLASH_CMDS = [
  { key:'regen', ic:'↻', label:'Regenerate this section', desc:'/regen'},
  { key:'expand', ic:'⇲', label:'Expand with more detail', desc:'/expand'},
  { key:'tighten', ic:'⇱', label:'Tighten — cut 25% of words', desc:'/tighten'},
  { key:'cite', ic:'¶', label:'Add a citation from sources', desc:'/cite'},
  { key:'rewrite', ic:'✎', label:'Rewrite in plain-language tone', desc:'/rewrite'},
  { key:'slashes', ic:'⌘', label:'Show all slash commands', desc:'/?'},
];

function ChatPane({ setActiveCite }) {
  const [input, setInput] = useStateChat("");
  const [chips, setChips] = useStateChat([
    { id: "ctx", label: "§1.3 Performance Objectives", on: true },
    { id: "src", label: "4 sources + 2 datasets", on: true },
  ]);
  const [focused, setFocused] = useStateChat(false);
  const [slashIdx, setSlashIdx] = useStateChat(0);
  const pushToast = useToast();
  const bodyRef = useRefChat(null);
  const showSlash = input.startsWith('/');
  const filteredSlash = showSlash ? SLASH_CMDS.filter(c => c.key.includes(input.slice(1).toLowerCase()) || input === '/') : [];

  const submit = () => {
    if (!input.trim()) return;
    pushToast({ text:'Request sent to drafter', icon:'↑', ttl:2500 });
    setInput('');
  };
  const onKey = (e) => {
    if (showSlash && filteredSlash.length > 0) {
      if (e.key === 'ArrowDown') { e.preventDefault(); setSlashIdx(i => Math.min(i+1, filteredSlash.length-1)); return; }
      if (e.key === 'ArrowUp') { e.preventDefault(); setSlashIdx(i => Math.max(i-1, 0)); return; }
      if (e.key === 'Tab' || (e.key === 'Enter' && !e.shiftKey)) {
        e.preventDefault();
        const cmd = filteredSlash[slashIdx];
        if (cmd) { setInput('/' + cmd.key + ' '); setTimeout(()=>setSlashIdx(0), 0); }
        return;
      }
    }
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
  };

  useEffectChat(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, []);

  return (
    <section className="pane">
      <div className="pane-head">
        <div className="pane-title">
          <h2>Chat</h2>
          <span className="count">4 turns</span>
        </div>

          <button className="icon-btn" title="Branch">⎇</button>
          <button className="icon-btn" title="Clear">⌫</button>
          <button className="icon-btn" title="More">⋯</button>

      </div>

          <div className="msg system">
            <div className="who">⚐</div>
            <div style={{minWidth:0, flex:1}}>
              <div className="msg-body">
                <b>New draft started from PWS template</b> · Walter Reed · EBH services.
                Chat, sources, and the draft stay in sync — citations from sources will show up numbered in the draft on the right.
              </div>
            </div>
          </div>
          {window.CHAT.map(m => <Msg key={m.id} m={m} setActiveCite={setActiveCite} />)}
        </div>
      </div>

      <div className={"composer" + (focused?' focused':'')}>
        <div className="composer-inner">
          {showSlash && filteredSlash.length > 0 && (
            <div className="slash-menu">
              <div className="slash-menu-header">Slash commands</div>
              {filteredSlash.map((c, i) => (
                <div key={c.key} className={"slash-item"+(i===slashIdx?' on':'')} onMouseEnter={()=>setSlashIdx(i)} onClick={()=>{ setInput('/' + c.key + ' '); }}>
                  <span className="ic">{c.ic}</span>
                  <span>{c.label}</span>
                  <span className="slash-key">{c.desc}</span>
                </div>
              ))}
            </div>
          )}
          <textarea
            placeholder="Ask, refine, or push a section — type / for commands, ⏎ to send, ⇧⏎ for newline"
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={onKey}
            onFocus={()=>setFocused(true)}
            onBlur={()=>setFocused(false)}
            rows={2}
          />
          <div className="composer-row">
            <div className="composer-chips">
              {chips.map(c => (
                <span key={c.id} className={"chip " + (c.on ? "on" : "")} onClick={() => setChips(cs => cs.map(x => x.id===c.id?{...x,on:!x.on}:x))}>
                  {c.label} <span className="x">×</span>
                </span>
              ))}
              <span className="chip" style={{cursor:'pointer',color:'var(--ink-3)'}}>+ add context</span>
            </div>
            <div className="send-row">
              {input.length > 0 && <span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--ink-3)'}}>{Math.ceil(input.length/4)} tok</span>}
              <span className="model-pick">gpt-4o ▾</span>
              <button className={"send-btn " + (input.trim() ? "" : "disabled")} title="Send (⏎)" onClick={submit}>↑</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

// ── Toast system ──────────────────────────────────────────────
const ToastCtx = React.createContext(null);
function ToastProvider({ children }) {
  const [toasts, setToasts] = React.useState([]);
  const push = React.useCallback((opts) => {
    const id = Math.random().toString(36).slice(2);
    const t = { id, tone:'accent', ttl: 4000, ...opts };
    setToasts(prev => [...prev, t]);
    setTimeout(() => setToasts(prev => prev.map(x => x.id===id ? {...x, leaving:true} : x)), t.ttl - 200);
    setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), t.ttl);
    return id;
  }, []);
  return (
    <ToastCtx.Provider value={push}>
      {children}
      <div className="toast-stack">
        {toasts.map(t => (
          <div key={t.id} className={"toast " + (t.tone||'') + (t.leaving?' leave':'')}>
            <span className="ic">{t.icon || '✓'}</span>
            <span>{t.text}</span>
            {t.undo && <span className="undo" onClick={() => { t.undo(); }}>Undo</span>}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
function useToast() { return React.useContext(ToastCtx) || (() => {}); }

}

// ── DOCX export ───────────────────────────────────────────────
async function buildAndDownloadDocx(doc) {
  if (!window.docx) { alert('docx.js not loaded'); return; }
  const { Document, Packer, Paragraph, HeadingLevel, TextRun, Footer, PageNumber, AlignmentType } = window.docx;
  const sections = (window.SECTIONS || []).filter(s => s.status !== 'queued');

  const children = [
    new Paragraph({ text: doc.title || 'Untitled', heading: HeadingLevel.TITLE }),
    new Paragraph({ children: [new TextRun({ text: doc.subtitle || '', italics: true, color: '666666' })] }),
    new Paragraph({ text: '' }),
  ];

  for (const s of sections) {
    children.push(new Paragraph({
      heading: HeadingLevel.HEADING_2,
      children: [
        new TextRun({ text: `${s.num}  `, bold: true }),
        new TextRun({ text: s.title, bold: true }),
      ],
    }));
    const body = (window.DRAFT_BODIES && window.DRAFT_BODIES[s.id]) || [`[§${s.num} ${s.title} — draft pending]`];
    for (const para of body) {
      children.push(new Paragraph({ children: [new TextRun({ text: para })] }));
    }
    children.push(new Paragraph({ text: '' }));
  }

  const d = new Document({
    creator: 'Ask Sage Co-Writer',
    title: doc.title || 'Draft',
    sections: [{
      properties: {},
      footers: {
        default: new Footer({
          children: [new Paragraph({
            alignment: AlignmentType.CENTER,
            children: [new TextRun({ text: 'Page ' }), new TextRun({ children: [PageNumber.CURRENT] })],
          })],
        }),
      },
      children,
    }],
  });
  const blob = await Packer.toBlob(d);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = (doc.title || 'draft').replace(/[^\w\-]+/g,'_') + '.docx';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
window.buildAndDownloadDocx = buildAndDownloadDocx;

async function parseDocxTemplate(file) {
  if (!window.mammoth) throw new Error('mammoth.js not loaded');
  const arrayBuffer = await file.arrayBuffer();
  const result = await window.mammoth.convertToHtml({ arrayBuffer });
  const html = result.value;
  // Extract headings + placeholder patterns like {{FIELD_NAME}} or [FIELD NAME]
  const container = document.createElement('div');
  container.innerHTML = html;
  const sections = [];
  let curNum = 1;
  container.querySelectorAll('h1, h2, h3').forEach(h => {
    const text = h.textContent.trim();
    if (!text) return;
    const m = text.match(/^(\d+(?:\.\d+)*)\s+(.+)$/);
    const num = m ? m[1] : String(curNum++);
    const title = m ? m[2] : text;
    sections.push({ num, title, level: Number(h.tagName[1]) });
  });
  const phMatches = [...html.matchAll(/\{\{\s*([A-Z_][A-Z0-9_]*)\s*\}\}|\[\s*([A-Z][A-Z0-9 _]{2,})\s*\]/g)];
  const placeholders = [...new Set(phMatches.map(m => (m[1] || m[2]).trim()))].slice(0, 30);
  return { sections, placeholders, rawHtml: html, wordCount: html.replace(/<[^>]+>/g,' ').split(/\s+/).filter(Boolean).length };
}
window.parseDocxTemplate = parseDocxTemplate;

      setError(e.message || String(e)); setPhase('error');

window.SettingsView = SettingsView;

// Top-level app
const { useState: useStateApp } = React;

function App() {
  const [active, setActive] = useStateApp("p-ebh");
  const [view, setView] = useStateApp("workspace");
  const [firstRun, setFirstRun] = useStateApp(false);
  const [exportOpen, setExportOpen] = useStateApp(false);
  const [ingestOpen, setIngestOpen] = useStateApp(false);
  const [ingestedTemplates, setIngestedTemplates] = useStateApp([]);
  const [cmdkOpen, setCmdkOpen] = useStateApp(false);
  const pushToast = useToast();

  // Bridge window events → toasts
  React.useEffect(() => {
    const handler = (e) => pushToast(e.detail || {});
    window.addEventListener('toast', handler);
    return () => window.removeEventListener('toast', handler);
  }, [pushToast]);

  // Global keyboard shortcuts
  React.useEffect(() => {
    let gPressed = false;
    let gTimer = null;
    const onKey = (e) => {
      const meta = e.metaKey || e.ctrlKey;
      const tag = (e.target.tagName || '').toLowerCase();
      const inField = tag === 'input' || tag === 'textarea';
      if (meta && e.key === 'k') { e.preventDefault(); setCmdkOpen(true); return; }
      if (meta && e.key === 'e') { e.preventDefault(); window.dispatchEvent(new CustomEvent('open-export')); return; }
      if (meta && e.key === 'r') { e.preventDefault(); pushToast({text:'Regenerating §1.3 Performance Objectives…', icon:'↻'}); return; }
      if (inField || meta) return;
      if (e.key === 'g' && !gPressed) { gPressed = true; gTimer = setTimeout(()=>gPressed=false, 800); return; }
      if (gPressed) {
        gPressed = false; clearTimeout(gTimer);
        if (e.key === 'l') { e.preventDefault(); setView('library'); }
        else if (e.key === 'a') { e.preventDefault(); setView('audit'); }
        else if (e.key === 'd') { e.preventDefault(); setView('workspace'); }
        else if (e.key === ',') { e.preventDefault(); setView('settings'); }
        return;
      }
      if (e.key === '/' && tag !== 'input' && tag !== 'textarea') {
        const ta = document.querySelector('.composer textarea');
        if (ta) { e.preventDefault(); ta.focus(); }
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [pushToast]);
  React.useEffect(() => {
    const oe = () => setExportOpen(true); const oi = () => setIngestOpen(true);
    window.addEventListener('open-export', oe); window.addEventListener('open-ingest', oi);
    return () => { window.removeEventListener('open-export', oe); window.removeEventListener('open-ingest', oi); };
  }, []);
  const [activeCite, setActiveCite] = useStateApp(null);
  const [state, setState] = useStateApp("drafting"); // drafting | review | done
  const [density, setDensity] = useStateApp("normal");
  const [mode, setMode] = useStateApp("workspace");   // workspace | empty
  const [tweaksOpen, setTweaksOpen] = useStateApp(false);
  const [introOpen, setIntroOpen] = useStateApp(true);

  // Expose Tweaks mode to the platform toolbar
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e || !e.data || !e.data.type) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const activeProject = window.PROJECTS.find(p => p.id === active) || window.PROJECTS[0];

  return (
    <div className="app">
      <Sidebar active={active} setActive={setActive} view={view} setView={setView} />

      <main className="workspace">
        <div className="topbar">
          <div className="crumbs">
            {view === 'settings' ? (
              <><span>Workspace</span><span className="sep">/</span><span className="current">Settings</span></>
            ) : view === 'library' ? (
              <><span>Workspace</span><span className="sep">/</span><span className="current">Library</span></>
            ) : view === 'audit' ? (
              <><span>Workspace</span><span className="sep">/</span><span className="current">Activity log</span></>
            ) : (
              <>
                <span>Projects</span>
                <span className="sep">/</span>
                <span className="current">{activeProject.name}</span>
                <span className="chip">{activeProject.template} template</span>
              </>
            )}
          </div>
          <div className="topbar-actions">
            <button className="btn btn-ghost" onClick={() => setCmdkOpen(true)} title="Command palette" style={{fontFamily:'var(--font-mono)', fontSize:11, color:'var(--ink-3)'}}>
              ⌕ Jump to…  <span style={{marginLeft:6, padding:'1px 5px', borderRadius:3, background:'var(--surface)', border:'1px solid var(--line)', fontSize:10}}>⌘K</span>
            </button>
            {view !== 'workspace' ? (
              <button className="btn" onClick={()=>setView('workspace')}>← Back to workspace</button>
            ) : (
              <>
                <button className="btn btn-ghost">⏵ Share</button>
                <button className="btn">⎘ Duplicate</button>
                <button className="btn btn-accent">＋ New section</button>
              </>
            )}
          </div>
        </div>

        {view === "settings" ? (
          <SettingsView onClose={() => setView("workspace")} />
        ) : view === "library" ? (
          <LibraryView onNewFromTemplate={()=>setView('workspace')} />
        ) : view === "audit" ? (
          <AuditView />
        ) : mode === "empty" ? (
          <EmptyState />
        ) : (
          <div className="panes" data-screen-label="01 Workspace">
            <SourcesPane activeCite={activeCite} setActiveCite={setActiveCite} />
            <ChatPane setActiveCite={setActiveCite} />
            <DraftPane state={state} activeCite={activeCite} setActiveCite={setActiveCite} />
          </div>
        )}
      </main>

      {mode === "firstrun" && <FirstRun onDone={()=>{ setMode("workspace"); setView("settings"); }} />}
      <CommandPalette open={cmdkOpen} onClose={()=>setCmdkOpen(false)} goView={setView} />
      <ExportModal open={exportOpen} onClose={()=>setExportOpen(false)} doc={{title: activeProject.name, subtitle: activeProject.subtitle || activeProject.template + ' draft'}} />
      <IngestModal open={ingestOpen} onClose={()=>setIngestOpen(false)} onIngested={(parsed, file) => { setIngestedTemplates(t => [...t, {name: file.name, sections: parsed.sections.length, placeholders: parsed.placeholders.length}]); pushToast({text: 'Registered template · ' + file.name, icon:'✓', tone:'sage'}); }} />
      <Tweaks
        viewTw={view} setViewTw={setView}
        open={tweaksOpen}
        onClose={() => { setTweaksOpen(false); window.parent.postMessage({type:'__deactivate_edit_mode'},'*'); }}
        state={state} setState={setState}
        density={density} setDensity={setDensity}
        mode={mode} setMode={setMode}
      />
    </div>
  );
}

function EmptyState() {
  return (
    <div className="empty-wrap">
      <div className="empty">
        <div className="mark-lg">A</div>
        <h1>Start a new draft</h1>
        <p>Describe what you need in plain language — a PWS, a J&amp;A, a staffing memo — and I'll pull from your attached sources and connected datasets to draft it section by section.</p>

        <div className="empty-starters">
          <div className="starter">
            <div className="starter-kind">PWS</div>
            <div className="starter-title">Performance Work Statement</div>
            <div className="starter-desc">Services contract · FAR Part 37 · outcome-based</div>
          </div>
          <div className="starter">
            <div className="starter-kind">J&amp;A</div>
            <div className="starter-title">Justification &amp; Approval</div>
            <div className="starter-desc">Sole-source or limited-source rationale</div>
          </div>
          <div className="starter">
            <div className="starter-kind">Market research</div>
            <div className="starter-title">Market research report</div>
            <div className="starter-desc">Capability search, vendor scan, NAICS fit</div>
          </div>
          <div className="starter">
            <div className="starter-kind">Memo</div>
            <div className="starter-title">Staff memo</div>
            <div className="starter-desc">For record / info / decision</div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ToastProvider><App /></ToastProvider>);
